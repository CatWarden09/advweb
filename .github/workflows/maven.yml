name: Java CI with Maven, Docker and Kubernetes

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test project with Maven Wrapper
        run: ./mvnw -B package

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest .
  
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest
  
      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            kubectl -n advweb rollout restart deployment/app
            # kubectl -n advweb rollout restart deployment/db
            # kubectl -n advweb rollout restart deployment/kafka
            # kubectl -n advweb rollout restart deployment/keycloak
            # kubectl -n advweb rollout restart deployment/redis
            # kubectl -n advweb rollout restart deployment/zookeeper
            kubectl -n advweb rollout status deployment/app --timeout=600s
            # kubectl -n advweb rollout status deployment/db --timeout=600s
            # kubectl -n advweb rollout status deployment/kafka --timeout=600s
            # kubectl -n advweb rollout status deployment/keycloak --timeout=600s
            # kubectl -n advweb rollout status deployment/redis --timeout=600s
            # kubectl -n advweb rollout status deployment/zookeeper --timeout=600s
