name: Java CI with Maven and server deployment

on:
  push:
    branches: [ "master", "dev", "feat/keycloak-final" ]
  pull_request:
    branches: [ "master", "dev", "feat/keycloak-final" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Make Maven Wrapper executable
      run: chmod +x ./mvnw
    
    - name: Build project with Maven Wrapper
      run: ./mvnw -B package
      
    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/advweb
          git checkout master
          git pull
          docker compose down
          docker compose up --build -d
