version: '3.8'

services:
  db:
    image: postgres:15
    container_name: advweb_db
    environment:
      POSTGRES_DB: advweb
      POSTGRES_USER: advweb_user
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - advweb_db_data:/var/lib/postgresql/data
    restart: always

  app:
    build: .
    container_name: advweb_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/advweb
      SPRING_DATASOURCE_USERNAME: advweb_user
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    restart: on-failure

volumes:
  advweb_db_data:
    name: advweb_db_data
  uploads:
    name: advweb_uploads