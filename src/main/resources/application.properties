spring.application.name=advweb

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/advweb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:advweb_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

app.public.base-url=${APP_PUBLIC_BASE_URL:https://advweb.duckdns.org}
app.keycloak.base-url=${APP_KEYCLOAK_BASE_URL:https://advweb.duckdns.org/auth}
app.keycloak.realm=${APP_KEYCLOAK_REALM:advweb}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${APP_KEYCLOAK_ISSUER_URI:https://advweb.duckdns.org/auth/realms/advweb}
server.forward-headers-strategy=framework
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.data.web.pageable.max-page-size=20

app.images.cleanup.cron=${APP_IMAGES_CLEANUP_CRON:0 0 4 * * *}
app.images.cleanup.zone=${APP_IMAGES_CLEANUP_ZONE:Europe/Moscow}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

springdoc.swagger-ui.oauth.client-id=${SPRINGDOC_SWAGGER_UI_OAUTH_CLIENT_ID:advweb-swagger}
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true

app.kafka.topics.weekly-digest=${APP_KAFKA_WEEKLY_DIGEST_TOPIC:weekly-digest-topic}
app.weekly-digest.cron=${APP_WEEKLY_DIGEST_CRON:0 0 9 * * MON}
app.weekly-digest.zone=${APP_WEEKLY_DIGEST_ZONE:Europe/Moscow}
app.weekly-digest.mail-from=${APP_WEEKLY_DIGEST_MAIL_FROM:iv4n.ivanov1909@gmail.com}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:email-notification-group}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.producer.acks=all
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.enable.idempotence=true

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
