apiVersion: apps/v1
kind: Deployment
metadata:
  name: advweb-demo
  namespace: advweb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: advweb-demo
  template:
    metadata:
      labels:
        app: advweb-demo
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      volumes:
        - name: uploads-data
          hostPath:
            path: /var/lib/docker/volumes/advweb_uploads/_data
            type: DirectoryOrCreate
      containers:
        - name: advweb-app
          image: catwarden09/advweb:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
          envFrom:
            - secretRef:
                name: advweb-env
          env:
            - name: SERVER_PORT
              value: "8088"
            # Replace this with the VPS host IP if it changes.
            - name: INFRA_HOST
              value: "92.38.48.50"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://92.38.48.50:5432/advweb
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SPRING_DATA_REDIS_HOST
              value: 92.38.48.50
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: 92.38.48.50:9092
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: https://advweb.duckdns.org/auth/realms/advweb
            - name: APP_KEYCLOAK_ISSUER_URI
              value: https://advweb.duckdns.org/auth/realms/advweb
            - name: APP_KEYCLOAK_BASE_URL
              value: https://advweb.duckdns.org/auth
            - name: APP_PUBLIC_BASE_URL
              value: https://advweb.duckdns.org
          volumeMounts:
            - name: uploads-data
              mountPath: /app/uploads
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            periodSeconds: 10
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: advweb-demo
  namespace: advweb
spec:
  selector:
    app: advweb-demo
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      nodePort: 30088
  type: NodePort
