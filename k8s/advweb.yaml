apiVersion: v1
kind: Namespace
metadata:
  name: advweb
---
apiVersion: v1
kind: Service
metadata:
  name: advweb-demo
  namespace: advweb
spec:
  type: NodePort
  selector:
    app: advweb-demo
  ports:
    - name: app
      port: 8080
      targetPort: 8088
      nodePort: 30081
    - name: keycloak
      port: 8081
      targetPort: 8081
      nodePort: 30082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: advweb-demo
  namespace: advweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: advweb-demo
  template:
    metadata:
      labels:
        app: advweb-demo
    spec:
      volumes:
        - name: postgres-data
          hostPath:
            path: /var/lib/docker/volumes/advweb_db_data/_data
            type: DirectoryOrCreate
        - name: uploads-data
          hostPath:
            path: /var/lib/docker/volumes/advweb_uploads/_data
            type: DirectoryOrCreate
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
          ports:
            - containerPort: 2181
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: localhost:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://localhost:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args:
            - start
            - --http-enabled=true
            - --http-port=8081
            - --proxy-headers=xforwarded
          ports:
            - containerPort: 8081
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: APP_KEYCLOAK_BASE_URL
            - name: KC_HTTP_RELATIVE_PATH
              value: /auth
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_LOG_LEVEL
              value: info
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://localhost:5432/advweb
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_PASSWORD
            - name: KC_DB_SCHEMA
              value: public
        - name: advweb-app
          image: advweb-app:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 8088
          envFrom:
            - secretRef:
                name: advweb-env
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://localhost:5432/advweb
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SPRING_DATA_REDIS_HOST
              value: localhost
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: localhost:9092
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://localhost:8081/auth/realms/advweb/protocol/openid-connect/certs
          volumeMounts:
            - name: uploads-data
              mountPath: /app/uploads
