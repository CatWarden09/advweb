apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: advweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.1
          args:
            - start
            - --http-enabled=true
            - --http-port=8080
            - --http-relative-path=/auth
            - --proxy-headers=xforwarded
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: KEYCLOAK_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: APP_KEYCLOAK_BASE_URL
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_LOG_LEVEL
              value: "info"
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: "jdbc:postgresql://db:5432/advweb"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: advweb-env
                  key: POSTGRES_PASSWORD
            - name: KC_DB_SCHEMA
              value: "public"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
      volumes:
        - name: keycloak-data
          hostPath:
            path: /var/lib/docker/volumes/advweb_keycloak_data/_data