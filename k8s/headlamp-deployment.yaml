apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.39.0
          imagePullPolicy: IfNotPresent
          args:
            - -in-cluster
            - -plugins-dir=/headlamp/plugins
          ports:
            - name: http
              containerPort: 4466
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
